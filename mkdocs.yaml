exclude_docs: |
  scripts/**

# Repository
repo_name: google/A2UI
repo_url: https://github.com/google/A2UI
edit_uri: raw/main/docs/

# Copyright
copyright: Copyright Google 2025&nbsp;&nbsp;|&nbsp;&nbsp;<a href="//policies.google.com/terms">Terms</a>&nbsp;&nbsp;|&nbsp;&nbsp;<a href="//policies.google.com/privacy">Privacy</a>&nbsp;&nbsp;|&nbsp;&nbsp;<a href="#__consent">Manage cookies</a>

# Custom CSS
extra_css:
  - stylesheets/custom.css

# Configuration
theme:
  name: material
  font:
    text: Google Sans
    code: Roboto Mono
  logo: assets/A2UI_light.svg
  favicon: assets/A2UI_dark.svg
  icon:
    repo: fontawesome/brands/github
    # view: material/pencil-box-multiple
    admonition:
      note: fontawesome/solid/note-sticky
      abstract: fontawesome/solid/book
      info: fontawesome/solid/circle-info
      tip: fontawesome/solid/bullhorn
      success: fontawesome/solid/check
      question: fontawesome/solid/circle-question
      warning: fontawesome/solid/triangle-exclamation
      failure: fontawesome/solid/bomb
      danger: fontawesome/solid/skull
      bug: fontawesome/solid/robot
      example: fontawesome/solid/flask
      quote: fontawesome/solid/quote-left
  palette:
    - scheme: default
      primary: teal
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - scheme: slate
      primary: teal
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - announce.dismiss
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.top
    - navigation.tracking
    - toc.follow

# Extensions
markdown_extensions:
  - meta
  - footnotes
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      url_download: true
      dedent_subsections: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

hooks:
  - hooks.py

# Plugins
plugins:
  - search
  - macros
  # - include-markdown
  - mermaid2
  - redirects:
      redirect_maps:
        # Files moved in docs-file-org reorganization
        "catalogs.md": "concepts/catalogs.md"
        "transports.md": "concepts/transports.md"
        "actions.md": "concepts/actions.md"
        "renderers.md": "reference/renderers.md"
        "agents.md": "reference/agents.md"
        "community.md": "ecosystem/community.md"
        "introduction/where-is-it-used.md": "ecosystem/a2ui-in-the-world.md"
        "guides/guide_a2ui_dynamic_mcp.md": "guides/a2ui-in-mcp-apps.md"
        "guides/mcp-apps-in-a2ui-surface.md": "guides/mcp-apps-in-a2ui.md"
        "concepts/client_to_server_actions.md": "concepts/actions.md"
        "client_to_server_actions.md": "concepts/actions.md"
        "guides/custom-components.md": "guides/authoring-components.md"
  # - llmstxt:
  #     full_output: llms-full.txt
  #     sections:
  #       "Specification":
  #         - a2ui_protocol.md
